project:
  type: website
  output-dir: docs
  resources:
    - editor.html

website:
  title: "Muller Chen Blog"
  description: "AI 工具・Causal ML 閱讀筆記"
  favicon: assets/favicon.svg
  navbar:
    left:
      - text: "首頁"
        href: index.qmd
      - text: "AI 工具"
        href: posts/ai-tools/index.qmd
      - text: "Causal Inference and Econometrics"
        href: posts/causalml/index.qmd
      - text: "論文筆記"
        href: posts/paper-notes/index.qmd
      - text: "✍️ 編輯器"
        href: editor.html
      - text: "關於我"
        href: about.qmd
    right:
      - icon: github
        href: https://github.com/Mullerchen910912
  page-footer:
    center: "© 2026 Muller Chen Blog"

format:
  html:
    theme:
      light: [flatly, theme-light.scss]
      dark: [darkly, theme-dark.scss]
    highlight-style: github
    code-fold: true
    toc: true
    toc-depth: 3
    number-sections: false
    include-in-header: [assets/fonts.html]

execute:
  freeze: auto
