<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>筆記編輯器 · Muller Chen</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/styles/github.min.css">
<style>
  :root{
    --bg:#ffffff; --panel:#f7f8fa; --border:#e3e6ea; --text:#1c1e21;
    --muted:#6b7280; --accent:#2c7be5; --accent2:#e8f0fe;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:"Noto Sans TC",system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text);background:var(--bg)}
  #app{display:flex;flex-direction:column;height:100vh}
  /* top bar */
  .topbar{display:flex;align-items:center;gap:.4rem;padding:.5rem .7rem;border-bottom:1px solid var(--border);background:var(--panel);flex-wrap:wrap}
  .topbar .brand{font-weight:700;margin-right:.4rem}
  .topbar a.home{color:var(--muted);text-decoration:none;font-size:.85rem}
  button,select,input{font:inherit}
  .btn{border:1px solid var(--border);background:#fff;border-radius:6px;padding:.3rem .55rem;cursor:pointer;font-size:.85rem;color:var(--text)}
  .btn:hover{background:var(--accent2);border-color:var(--accent)}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.danger:hover{background:#fde8e8;border-color:#e05252;color:#b91c1c}
  .spacer{flex:1}
  .status{font-size:.78rem;color:var(--muted);min-width:5.5rem;text-align:right}
  /* toolbar */
  .toolbar{display:flex;align-items:center;gap:.25rem;padding:.35rem .7rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .toolbar .tbtn{border:1px solid transparent;background:transparent;border-radius:5px;padding:.25rem .5rem;cursor:pointer;font-size:.85rem;color:var(--text)}
  .toolbar .tbtn:hover{background:var(--panel);border-color:var(--border)}
  .sep{width:1px;height:1.1rem;background:var(--border);margin:0 .25rem}
  /* frontmatter */
  .fm{display:none;gap:.5rem;padding:.5rem .7rem;border-bottom:1px solid var(--border);background:var(--panel);flex-wrap:wrap;align-items:center}
  .fm.show{display:flex}
  .fm label{font-size:.78rem;color:var(--muted);display:flex;flex-direction:column;gap:.15rem}
  .fm input,.fm select{border:1px solid var(--border);border-radius:5px;padding:.25rem .4rem;background:#fff}
  .fm input[type=text]{min-width:12rem}
  .fm .chk{flex-direction:row;align-items:center;gap:.3rem;margin-top:1rem}
  /* main */
  .main{flex:1;display:flex;min-height:0}
  .side{width:200px;border-right:1px solid var(--border);background:var(--panel);overflow-y:auto;flex-shrink:0}
  .side .newbtn{width:calc(100% - 1rem);margin:.5rem}
  .doc{padding:.5rem .7rem;border-bottom:1px solid var(--border);cursor:pointer;font-size:.85rem}
  .doc:hover{background:#fff}
  .doc.active{background:var(--accent2);border-left:3px solid var(--accent)}
  .doc .t{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .doc .d{color:var(--muted);font-size:.72rem}
  .panes{flex:1;display:flex;min-width:0}
  textarea#src{flex:1;border:none;outline:none;resize:none;padding:1rem;font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:14px;line-height:1.6;background:#fff}
  .divider{width:1px;background:var(--border)}
  #preview{flex:1;overflow-y:auto;padding:1rem 1.4rem;line-height:1.7}
  #preview h1,#preview h2,#preview h3{border-bottom:1px solid var(--border);padding-bottom:.2em}
  #preview pre{background:var(--panel);padding:.8rem 1rem;border-radius:8px;overflow-x:auto}
  #preview code{background:var(--panel);padding:.1em .35em;border-radius:4px;font-size:.9em}
  #preview pre code{background:none;padding:0}
  #preview table{border-collapse:collapse}
  #preview th,#preview td{border:1px solid var(--border);padding:.35rem .6rem}
  #preview blockquote{border-left:3px solid var(--accent);margin:0;padding:.2rem 1rem;color:var(--muted)}
  #preview img{max-width:100%}
  @media (max-width:820px){
    .side{display:none}
    .panes{flex-direction:column}
    .divider{width:auto;height:1px}
  }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <span class="brand">✍️ 筆記編輯器</span>
    <a class="home" href="index.html">← 回網站</a>
    <span class="spacer"></span>
    <button class="btn" id="btnCheat">Σ 巨集</button>
    <button class="btn" id="btnFm">Frontmatter</button>
    <button class="btn" id="btnImport">匯入 .md</button>
    <button class="btn" id="btnMd">下載 .md</button>
    <button class="btn primary" id="btnQmd">下載 .qmd</button>
    <button class="btn" id="btnCopy">複製 .qmd</button>
    <span class="status" id="status">—</span>
    <input type="file" id="file" accept=".md,.markdown,.qmd,.txt" style="display:none">
  </div>

  <div class="toolbar" id="toolbar">
    <button class="tbtn" data-act="h">H</button>
    <button class="tbtn" data-act="b"><b>B</b></button>
    <button class="tbtn" data-act="i"><i>I</i></button>
    <button class="tbtn" data-act="code">&lt;code&gt;</button>
    <button class="tbtn" data-act="block">代碼塊</button>
    <span class="sep"></span>
    <button class="tbtn" data-act="imath">$x$</button>
    <button class="tbtn" data-act="dmath">$$…$$</button>
    <span class="sep"></span>
    <button class="tbtn" data-act="ul">• 清單</button>
    <button class="tbtn" data-act="ol">1. 清單</button>
    <button class="tbtn" data-act="quote">引用</button>
    <button class="tbtn" data-act="link">連結</button>
    <button class="tbtn" data-act="table">表格</button>
    <span class="spacer"></span>
    <span class="status" id="wc">0 字</span>
  </div>

  <div class="fm" id="fm">
    <label>title<input type="text" id="fmTitle" placeholder="文章標題"></label>
    <label>date<input type="date" id="fmDate"></label>
    <label>description<input type="text" id="fmDesc" placeholder="一句話描述"></label>
    <label>category
      <select id="fmCat">
        <option value="paper-notes">paper-notes</option>
        <option value="causalml">causalml</option>
        <option value="ai-tools">ai-tools</option>
        <option value="r-data-wrangling">r-data-wrangling</option>
        <option value="thesis">thesis</option>
      </select>
    </label>
    <label>tags（逗號分隔）<input type="text" id="fmTags" placeholder="did, panel-data"></label>
    <label class="chk"><input type="checkbox" id="fmDraft" checked> draft</label>
  </div>

  <div class="fm" id="cheat"></div>

  <div class="main">
    <div class="side" id="side">
      <button class="btn primary newbtn" id="btnNew">＋ 新筆記</button>
      <div id="doclist"></div>
    </div>
    <div class="panes">
      <textarea id="src" spellcheck="false" placeholder="在這裡寫 Markdown 與 $LaTeX$ …"></textarea>
      <div class="divider"></div>
      <div id="preview"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/highlight.min.js"></script>
<script>
const KEY = "mc_editor_docs_v1";
const $ = s => document.querySelector(s);
const src = $("#src"), preview = $("#preview");
let state = load();

function load(){
  try{ const s = JSON.parse(localStorage.getItem(KEY)); if(s && s.docs) return s; }catch(e){}
  const id = uid();
  return {current:id, docs:{[id]:blank(id,"未命名筆記")}};
}
function blank(id,name){
  return {id,name,title:"",date:today(),desc:"",cat:"paper-notes",tags:"",draft:true,content:"",updated:Date.now()};
}
function uid(){ return "d"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function today(){ return new Date().toISOString().slice(0,10); }
function cur(){ return state.docs[state.current]; }
function persist(){ localStorage.setItem(KEY, JSON.stringify(state)); }

/* ---------- rendering (protect math -> marked -> restore -> KaTeX -> hljs) ---------- */
function render(md){
  const math=[];
  let s = md.replace(/\$\$([\s\S]+?)\$\$/g, m=>{math.push(m);return "@@M"+(math.length-1)+"@@";})
            .replace(/\$([^\$\n]+?)\$/g, m=>{math.push(m);return "@@M"+(math.length-1)+"@@";});
  let html = marked.parse(s, {breaks:false, gfm:true});
  html = html.replace(/@@M(\d+)@@/g, (_,i)=>math[i]);
  return html;
}
function updatePreview(){
  preview.innerHTML = render(src.value);
  try{ renderMathInElement(preview,{delimiters:[
    {left:"$$",right:"$$",display:true},{left:"$",right:"$",display:false}
  ],throwOnError:false}); }catch(e){}
  preview.querySelectorAll("pre code").forEach(b=>{ try{hljs.highlightElement(b);}catch(e){} });
  $("#wc").textContent = src.value.length + " 字";
}

/* ---------- doc list ---------- */
function renderList(){
  const dl = $("#doclist"); dl.innerHTML="";
  Object.values(state.docs).sort((a,b)=>b.updated-a.updated).forEach(d=>{
    const el=document.createElement("div");
    el.className="doc"+(d.id===state.current?" active":"");
    const name = d.name || d.title || "未命名";
    el.innerHTML='<div class="t">'+escapeHtml(name)+'</div><div class="d">'+new Date(d.updated).toLocaleDateString()+'</div>';
    el.onclick=()=>{ selectDoc(d.id); };
    dl.appendChild(el);
  });
}
function escapeHtml(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function selectDoc(id){ state.current=id; persist(); syncFields(); updatePreview(); renderList(); }
function syncFields(){
  const d=cur();
  src.value=d.content||"";
  $("#fmTitle").value=d.title||""; $("#fmDate").value=d.date||today();
  $("#fmDesc").value=d.desc||""; $("#fmCat").value=d.cat||"paper-notes";
  $("#fmTags").value=d.tags||""; $("#fmDraft").checked=d.draft!==false;
}

/* ---------- events ---------- */
let saveTimer=null, composing=false;
src.addEventListener("compositionstart",()=>composing=true);
src.addEventListener("compositionend",()=>composing=false);
src.addEventListener("input",()=>{
  if(!composing) expandSnippets();
  cur().content=src.value; cur().updated=Date.now();
  updatePreview();
  $("#status").textContent="編輯中…";
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{ persist(); renderList(); $("#status").textContent="已儲存 ✓"; },400);
});
["fmTitle","fmDate","fmDesc","fmCat","fmTags"].forEach(id=>{
  $("#"+id).addEventListener("input",()=>{ const d=cur();
    d.title=$("#fmTitle").value; d.date=$("#fmDate").value; d.desc=$("#fmDesc").value;
    d.cat=$("#fmCat").value; d.tags=$("#fmTags").value; d.updated=Date.now();
    persist(); renderList(); });
});
$("#fmDraft").addEventListener("change",()=>{ cur().draft=$("#fmDraft").checked; persist(); });

$("#btnNew").onclick=()=>{ const id=uid(); state.docs[id]=blank(id,"未命名筆記"); selectDoc(id); src.focus(); };
$("#btnFm").onclick=()=>$("#fm").classList.toggle("show");
$("#btnImport").onclick=()=>$("#file").click();
$("#file").onchange=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>{ const id=uid(); const d=blank(id,f.name.replace(/\.[^.]+$/,"")); d.content=r.result; d.title=d.name;
    state.docs[id]=d; selectDoc(id); }; r.readAsText(f); e.target.value=""; };

/* delete / rename via keyboard-free buttons in sidebar header */
$("#side").addEventListener("dblclick",e=>{
  const doc=e.target.closest(".doc"); if(!doc)return;
});

$("#btnMd").onclick=()=>download((cur().name||"note")+".md", src.value);
$("#btnQmd").onclick=()=>{ const slug=(cur().title||cur().name||"post").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")||"post";
  download(slug+".qmd", buildQmd()); };
$("#btnCopy").onclick=async()=>{ try{ await navigator.clipboard.writeText(buildQmd()); $("#status").textContent="已複製 .qmd ✓"; }catch(e){ $("#status").textContent="複製失敗"; } };

function buildFrontmatter(){
  const d=cur();
  const tags=(d.tags||"").split(",").map(s=>s.trim()).filter(Boolean);
  const cats=[d.cat,...tags].filter(Boolean).join(", ");
  return "---\n"+
    'title: "'+(d.title||"未命名")+'"\n'+
    'date: "'+(d.date||today())+'"\n'+
    'description: "'+(d.desc||"")+'"\n'+
    "categories: ["+cats+"]\n"+
    "draft: "+(d.draft!==false)+"\n"+
    "bibliography: ../../references.bib\n"+
    "csl: ../../apa.csl\n"+
    "---\n\n";
}
function buildQmd(){ return buildFrontmatter()+src.value; }

function download(name, text){
  const blob=new Blob([text],{type:"text/plain;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

/* ---------- toolbar ---------- */
const TB="\x60\x60\x60"; // triple backtick without literal sequence
function surround(before,after){
  const s=src.selectionStart,e=src.selectionEnd,v=src.value,sel=v.slice(s,e);
  src.value=v.slice(0,s)+before+sel+after+v.slice(e);
  src.focus(); src.selectionStart=s+before.length; src.selectionEnd=e+before.length;
  src.dispatchEvent(new Event("input"));
}
function linePrefix(pfx){
  const s=src.selectionStart,v=src.value,ls=v.lastIndexOf("\n",s-1)+1;
  src.value=v.slice(0,ls)+pfx+v.slice(ls); src.focus(); src.dispatchEvent(new Event("input"));
}
$("#toolbar").addEventListener("click",e=>{
  const b=e.target.closest(".tbtn"); if(!b)return; const a=b.dataset.act;
  if(a==="h")linePrefix("## ");
  else if(a==="b")surround("**","**");
  else if(a==="i")surround("*","*");
  else if(a==="code")surround("`","`");
  else if(a==="block")surround("\n"+TB+"python\n","\n"+TB+"\n");
  else if(a==="imath")surround("$","$");
  else if(a==="dmath")surround("\n$$\n","\n$$\n");
  else if(a==="ul")linePrefix("- ");
  else if(a==="ol")linePrefix("1. ");
  else if(a==="quote")linePrefix("> ");
  else if(a==="link")surround("[","](https://)");
  else if(a==="table")surround("\n| A | B |\n|---|---|\n| 1 | 2 |\n","");
});

/* Tab inserts spaces */
src.addEventListener("keydown",e=>{ if(e.key==="Tab"){ e.preventDefault(); surround("  ",""); } });

/* delete current doc: shift+click the active item */
document.addEventListener("keydown",e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==="s"){ e.preventDefault(); persist(); $("#status").textContent="已儲存 ✓"; }
});

/* ---------- LaTeX-Suite-style snippets (expand inside $…$ only) ---------- */
const SNIPPETS=[
  // symbolic / operators — fire anywhere in math
  {t:"|->",r:"\\mapsto "},{t:"->",r:"\\to "},{t:"=>",r:"\\Rightarrow "},
  {t:"!=",r:"\\neq "},{t:">=",r:"\\geq "},{t:"<=",r:"\\leq "},{t:"~=",r:"\\approx "},
  {t:"+-",r:"\\pm "},{t:"xx",r:"\\times "},{t:"...",r:"\\dots "},
  {t:"//",r:"\\frac{#0}{}"},{t:"sr",r:"^{2}"},{t:"cb",r:"^{3}"},{t:"ooo",r:"\\infty "},
  // words — only when preceded by a non-letter
  {t:"sq",r:"\\sqrt{#0}",w:1},{t:"te",r:"\\text{#0}",w:1},
  {t:"sum",r:"\\sum_{#0}^{}",w:1},{t:"int",r:"\\int_{#0}^{}",w:1},
  {t:"prod",r:"\\prod_{#0}^{}",w:1},{t:"lim",r:"\\lim_{#0} ",w:1},
  {t:"hat",r:"\\hat{#0}",w:1},{t:"bar",r:"\\bar{#0}",w:1},
  {t:"td",r:"\\tilde{#0}",w:1},{t:"vec",r:"\\vec{#0}",w:1},
  {t:"EE",r:"\\mathbb{E}",w:1},{t:"PP",r:"\\mathbb{P}",w:1},
  {t:"RR",r:"\\mathbb{R}",w:1},{t:"NN",r:"\\mathbb{N}",w:1},
  {t:"argmax",r:"\\operatorname*{arg\\,max}_{#0} ",w:1},
  {t:"argmin",r:"\\operatorname*{arg\\,min}_{#0} ",w:1},
  // greek: @ + letter (2 chars, no prefix collisions)
  {t:"@a",r:"\\alpha "},{t:"@b",r:"\\beta "},{t:"@g",r:"\\gamma "},{t:"@d",r:"\\delta "},
  {t:"@e",r:"\\epsilon "},{t:"@ve",r:"\\varepsilon "},{t:"@z",r:"\\zeta "},{t:"@h",r:"\\eta "},
  {t:"@q",r:"\\theta "},{t:"@k",r:"\\kappa "},{t:"@l",r:"\\lambda "},{t:"@m",r:"\\mu "},
  {t:"@n",r:"\\nu "},{t:"@x",r:"\\xi "},{t:"@p",r:"\\pi "},{t:"@r",r:"\\rho "},
  {t:"@s",r:"\\sigma "},{t:"@t",r:"\\tau "},{t:"@f",r:"\\phi "},{t:"@c",r:"\\chi "},
  {t:"@y",r:"\\psi "},{t:"@w",r:"\\omega "},
  {t:"@G",r:"\\Gamma "},{t:"@D",r:"\\Delta "},{t:"@Q",r:"\\Theta "},{t:"@L",r:"\\Lambda "},
  {t:"@P",r:"\\Pi "},{t:"@S",r:"\\Sigma "},{t:"@F",r:"\\Phi "},{t:"@Y",r:"\\Psi "},{t:"@W",r:"\\Omega "},
].sort((a,b)=>b.t.length-a.t.length);

function inMath(t,pos){
  const b=t.slice(0,pos);
  if(((b.match(/\$\$/g)||[]).length)%2===1) return true;      // inside a $$…$$ block
  const masked=b.replace(/\$\$/g,"");                          // drop $$ then count single $
  let singles=0; for(let i=0;i<masked.length;i++){ if(masked[i]==="$"&&masked[i-1]!=="\\") singles++; }
  return singles%2===1;
}
function expandSnippets(){
  if(src.selectionStart!==src.selectionEnd) return;           // only on a caret
  const pos=src.selectionStart, t=src.value;
  if(!inMath(t,pos)) return;
  const before=t.slice(0,pos);
  for(const s of SNIPPETS){
    if(!before.endsWith(s.t)) continue;
    const bch=before[before.length-s.t.length-1];
    if(s.w && bch && /[A-Za-z]/.test(bch)) continue;          // word snippet: need non-letter before
    const start=pos-s.t.length;
    const k=s.r.indexOf("#0"), rep=s.r.replace("#0","");
    src.value=t.slice(0,start)+rep+t.slice(pos);
    const caret=start+(k>=0?k:rep.length);
    src.selectionStart=src.selectionEnd=caret;
    return;
  }
}
$("#btnCheat").onclick=()=>$("#cheat").classList.toggle("show");
(function(){
  const fmt=a=>a.map(s=>'<code>'+s.t+'</code>→'+s.r.replace('#0','').trim()).join('　');
  $("#cheat").innerHTML='<div style="font-size:.8rem;line-height:2.1">'+
    '<b>在 $…$ 內打縮寫即自動展開　</b><br>'+
    '<b>希臘：</b>'+fmt(SNIPPETS.filter(s=>s.t[0]==='@'))+'<br>'+
    '<b>數學：</b>'+fmt(SNIPPETS.filter(s=>s.t[0]!=='@'))+'</div>';
})();

/* ---------- boot ---------- */
marked.setOptions({headerIds:true, mangle:false});
syncFields(); updatePreview(); renderList();
if(!cur().content){ src.value="# 我的筆記\n\n支援 **Markdown** 與 LaTeX：$e^{i\\pi}+1=0$。\n\n$$\\hat\\beta = (X'X)^{-1}X'y$$\n\n- 左邊打字、右邊即時預覽\n- 自動存在瀏覽器，隨時可下載 .md / .qmd\n"; cur().content=src.value; updatePreview(); }
</script>
</body>
</html>
